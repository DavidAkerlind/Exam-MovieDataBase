<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Movie Database - Favorites</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

        <link rel="stylesheet" href="./styles/style.css" />
        <link
            rel="icon"
            href="./res/icons/4e4d1510-13ea-4b26-8438-928b063febd0.jpg" />
        <script
            src="https://kit.fontawesome.com/f300007e95.js"
            crossorigin="anonymous"></script>
        <script type="module" src="./scripts/script.js"></script>
    </head>
    <body>
        <!-- Favorite movies section -->
        <section class="content-wrapper">
            <h1 class="favorites-title" id="favoritesTitle">Your favorites</h1>
            <section class="card-container" id="cardContainer"></section>
        </section>
    </body>
    <footer class="footer">
        <!-- Contact Info Section -->
        <section class="footer__contact-info">
            <h2 class="footer__title">Get in touch</h2>
            <ul class="footer__contact-list">
                <li class="footer__contact-item">MMDb Inc</li>
                <li class="footer__contact-item">Lorem, ipsum.</li>
                <li class="footer__contact-item">654 60 Karlstad</li>
                <li class="footer__contact-item">Org.nr 123412-1232</li>
                <li class="footer__contact-item">
                    Phone:
                    <a href="tel:+1234567890" class="footer__contact-link"
                        >+1234567890</a
                    >
                </li>
                <li class="footer__contact-item">
                    Email:
                    <a
                        href="mailto:contact@yourcompany.com"
                        class="footer__contact-link"
                        >contact@mmdb.com</a
                    >
                </li>
                <li class="footer__contact-item">
                    <ul class="footer__contact-list footer__contact-list--row">
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Facebook page">
                                <i
                                    class="fab fa-facebook footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our X (previous Twitter) page">
                                <i
                                    class="fab fa-twitter footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Instagram page">
                                <i
                                    class="fab fa-instagram footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Pinterest page">
                                <i
                                    class="fab fa-pinterest footer__social-icon"></i>
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </section>

        <!-- Newsletter Section -->
        <section class="footer__newsletter">
            <h2 class="footer__title">Stay updated</h2>
            <p class="footer__newsletter-description">
                Sign up to receive the latest movie news and updates.
            </p>

            <form id="newsletterForm" class="footer__newsletter-form">
                <label
                    for="email"
                    class="d-none booking-widget__label--hidden"
                    aria-label="Enter your email"
                    >Enter your email:</label
                >
                <input
                    class="footer__newsletter-input"
                    aria-label="Enter your email"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your.email@example.com" />
                <button class="footer__button" type="submit">Subscribe</button>
            </form>
        </section>

        <!-- Follow Section -->
        <section class="footer__follow">
            <h2 class="footer__title footer__title--no-margin">Follow Us</h2>
            <figure class="footer__follow-img-container">
                <a
                    aria-label="Visit our Instagram page"
                    href="https://instagram.com"
                    target="_blank">
                    <img
                        class="footer__follow-img"
                        src="./res/icons/2671786c-0d12-40d9-8a2e-22a6940bd268.png"
                        alt="Company Logo" />
                </a>
            </figure>
            <button class="footer__button">FOLLOW US</button>
        </section>
    </footer>
</html>
