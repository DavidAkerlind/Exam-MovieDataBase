<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Movie Database</title>
        <link rel="stylesheet" href="./styles/style.css" />
        <script
            src="https://kit.fontawesome.com/f300007e95.js"
            crossorigin="anonymous"></script>
        <script type="module" src="./scripts/script.js"></script>
    </head>
    <body>
        <div class="content-wrapper">
            <!-- Trailer Caroussel -->
            <section class="content-wrapper content-wrapper--trailers">
                <section class="trailers">
                    <img
                        src="./res/icons/arrow-left.svg"
                        alt="left navigation arrow"
                        class="trailers__arrow trailers__arrow--left"
                        data-direction="left" />
                    <img
                        src="./res/icons/arrow-right.svg"
                        alt="right navigation arrow"
                        class="trailers__arrow trailers__arrow--right"
                        data-direction="right" />
                    <section class="trailers__container"></section>
                </section>
            </section>

            <!-- Our recommended movies section -->
            <section class="content-wrapper">
                <h2 class="popular-title">Our recommendations</h2>
                <div id="podiumContainer" class="podium-section"></div>

                <section class="card-container" id="cardContainer"></section>
                <section class="movie-list" id="movieList"></section>
            </section>
        </div>
    </body>
    <footer class="footer">
        <!-- Contact Info Section -->
        <section class="footer__contact-info">
            <h2 class="footer__title">Get in touch</h2>
            <ul class="footer__contact-list">
                <li class="footer__contact-item">MMDb AB</li>
                <li class="footer__contact-item">Lorem, ipsum.</li>
                <li class="footer__contact-item">654 60 Karlstad</li>
                <li class="footer__contact-item">Org.nr 123412-1232</li>
                <li class="footer__contact-item">
                    Phone:
                    <a href="tel:+1234567890" class="footer__contact-link"
                        >+1234567890</a
                    >
                </li>
                <li class="footer__contact-item">
                    Email:
                    <a
                        href="mailto:contact@yourcompany.com"
                        class="footer__contact-link"
                        >contact@mmdb.com</a
                    >
                </li>
                <li class="footer__contact-item">
                    <ul class="footer__contact-list footer__contact-list--row">
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Facebook page">
                                <i
                                    class="fab fa-facebook footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our X (previous Twitter) page">
                                <i
                                    class="fab fa-twitter footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Instagram page">
                                <i
                                    class="fab fa-instagram footer__social-icon"></i>
                            </a>
                        </li>
                        <li class="footer__social-item">
                            <a
                                href="#"
                                class="footer__social-link"
                                aria-label="Visit our Pinterest page">
                                <i
                                    class="fab fa-pinterest footer__social-icon"></i>
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </section>

        <!-- Newsletter Section -->
        <section class="footer__newsletter">
            <h2 class="footer__title">Stay updated</h2>
            <p class="footer__newsletter-description">
                Sign up to receive the latest movie news and updates.
            </p>

            <form class="footer__newsletter-form">
                <label
                    for="email"
                    class="footer__newsletter-label booking-widget__label--hidden"
                    aria-label="Enter your email"
                    >Enter your email:</label
                >
                <input
                    class="footer__newsletter-input"
                    aria-label="Enter your email"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="your.email@example.com"
                    required />
                <button
                    class="button button--bg-black button--wide"
                    type="submit">
                    Subscribe
                </button>
            </form>
        </section>

        <!-- Follow Section -->
        <section class="footer__follow">
            <h2 class="footer__title">Follow Us</h2>
            <figure class="footer__follow-img-container">
                <a href="https://instagram.com" target="_blank">
                    <img
                        class="footer__follow-img"
                        src="./res/logo.png"
                        alt="Company Logo" />
                </a>
            </figure>
            <button class="button button--no-border">FOLLOW US</button>
        </section>
    </footer>
</html>
