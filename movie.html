<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Movie</title>
        <link rel="stylesheet" href="./styles/style.css" />
        <script
            src="https://kit.fontawesome.com/f300007e95.js"
            crossorigin="anonymous"></script>
        <script type="module" src="./scripts/script.js"></script>
    </head>
    <body>
        <header class="header header--flex">
            <div class="header__container">
                <a class="header__logo-link" href="index.html">
                    <img
                        class="header__logo"
                        src="./res/logo.png"
                        alt="Website Logo" />
                </a>

                <nav class="header__nav" aria-label="Main Navigation">
                    <ul class="header__nav-list">
                        <li class="header__nav-item">
                            <form
                                class="header__form"
                                id="searchForm"
                                role="search">
                                <label
                                    for="searchInput"
                                    class="header__form-label">
                                    Search MMDb:
                                </label>
                                <input
                                    class="header__input"
                                    id="searchInput"
                                    type="text"
                                    placeholder="Search MMDb"
                                    aria-label="Search movies on IMDb" />
                                <button
                                    class="header__form-btn"
                                    id="searchBtn"
                                    aria-label="Search">
                                    <img
                                        src="./res/icons/search-black.svg"
                                        alt="Search Icon" />
                                </button>
                            </form>
                        </li>
                        <li class="header__nav-item">
                            <a href="./search.html" class="header__nav-link">
                                Search
                            </a>
                        </li>
                        <li class="header__nav-item">
                            <a
                                href="./favorites.html"
                                class="header__nav-link header__nav-link--fav"
                                id="favBtn">
                                Favorites
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <!-- Movie Detailed Information -->

        <div class="content-wrapper">
            <section class="movie-info" id="movieInfo"></section>
        </div>
    </body>
</html>
