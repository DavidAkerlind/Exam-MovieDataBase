<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Movie Database - Search</title>
        <link rel="stylesheet" href="./styles/style.css" />
        <script
            src="https://kit.fontawesome.com/f300007e95.js"
            crossorigin="anonymous"></script>
        <script type="module" src="./scripts/script.js"></script>
    </head>
    <body>
        <!-- Search movies section -->
        <section class="content-wrapper">
            <h2 class="search-title" id="searchHeader">Search Results</h2>
            <div class="search-container">
                <form class="header__form" id="searchForm" role="search">
                    <label for="searchInput" class="header__form-label"
                        >Search MMDb:</label
                    >
                    <input
                        autocomplete="off"
                        class="header__input"
                        id="searchInput"
                        type="text"
                        placeholder="Search MMDb"
                        aria-label="Search movies on IMDb" />
                    <ul id="searchResults" class="search-results d-none"></ul>

                    <button
                        class="header__form-btn header__form-btn--padding"
                        id="searchBtn"
                        aria-label="Search">
                        <img
                            src="./res/icons/search-black.svg"
                            alt="Search Icon" />
                    </button>
                    <ul class="search-results d-none"></ul>
                </form>
            </div>
            <section class="card-container" id="cardContainer"></section>
        </section>
    </body>
</html>
